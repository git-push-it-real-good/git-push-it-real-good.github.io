<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Proxter Studios</title>
<meta name="description" content="Proxter Studios — Casual Apps aus Deutschland.">
<style>
  :root {
    color-scheme: light dark;
    --bg: #111;
    --fg: #eee;
    --accent: #f4a340;
    --muted: #888;
  }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    box-sizing: border-box;
  }
  main { max-width: 32rem; text-align: center; }
  h1 { font-size: 3rem; margin: 0 0 0.5rem; letter-spacing: -0.02em; }
  .tagline { color: var(--muted); margin: 0.5rem 0 2rem; }
  footer { margin-top: 3rem; font-size: 0.85rem; color: var(--muted); }
  footer a { color: var(--muted); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.15s; }
  footer a:hover { border-bottom-color: var(--accent); }
</style>
</head>
<body>
<main>
  <h1>Proxter Studios</h1>
  <p class="tagline">Casual Apps aus Deutschland. Mehr folgt.</p>
  <footer>
    <a href="/privacy.html">Datenschutz</a>
  </footer>
</main>
</body>
</html>
